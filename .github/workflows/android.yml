name: React Native Android CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: fe

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: fe/package-lock.json

      - name: Install Dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      - name: Run Jest
        run: npm test -- --ci

      - name: Run TypeScript Check
        run: npm run typecheck

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('fe/android/**/*.gradle*', 'fe/android/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}

      - name: Grant Execute Permission
        working-directory: fe/android
        run: chmod +x gradlew

      - name: Build AAB
        working-directory: fe/android
        run: ./gradlew bundleRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: fe/android/app/build/outputs/bundle/release/app-release.aab